<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}torch.compile CPU lab{% endblock %}</title>
<style>
:root { --bg:#fff; --fg:#1a1a1a; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb;
        --ok:#16a34a; --bad:#dc2626; --warn:#d97706; }
@media (prefers-color-scheme: dark) {
  :root { --bg:#111418; --fg:#e5e7eb; --muted:#9ca3af; --line:#2d333b; --accent:#60a5fa;
          --ok:#4ade80; --bad:#f87171; --warn:#fbbf24; }
}
body { margin:0 auto; max-width:64rem; padding:1.5rem; background:var(--bg);
       color:var(--fg); font:15px/1.5 system-ui, sans-serif; }
a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
h1 { font-size:1.3rem; } h2 { font-size:1.05rem; margin-top:1.6rem; }
table { border-collapse:collapse; width:100%; margin:0.6rem 0; }
th, td { text-align:left; padding:0.35rem 0.7rem 0.35rem 0; border-bottom:1px solid var(--line);
         font-variant-numeric:tabular-nums; vertical-align:top; }
th { color:var(--muted); font-weight:600; font-size:0.82rem; text-transform:uppercase; }
code, pre { font:0.85em ui-monospace, monospace; }
pre { padding:0.7rem; border:1px solid var(--line); border-radius:6px; overflow-x:auto; }
.badge { padding:0.1rem 0.5rem; border-radius:9999px; font-size:0.78rem; font-weight:600; }
.badge.done { color:var(--ok); border:1px solid var(--ok); }
.badge.failed { color:var(--bad); border:1px solid var(--bad); }
.badge.running, .badge.queued { color:var(--warn); border:1px solid var(--warn); }
.muted { color:var(--muted); }
nav { margin-bottom:1.2rem; } nav a { margin-right:1rem; }
.scroll { overflow-x:auto; }
</style>
</head>
<body>
<nav><a href="/">runs</a><a href="/compare">compare</a></nav>
{% block content %}{% endblock %}
</body>
</html>
