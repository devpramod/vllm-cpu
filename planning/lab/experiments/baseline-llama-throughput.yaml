# Llama-3.1-8B tp2 throughput (ShareGPT, 200 prompts), inductor vs eager.
# Mirrors .buildkite/performance-benchmarks/tests/throughput-tests-cpu.json.
# The ShareGPT dataset is downloaded to {remote_root}/datasets by bootstrap.sh.
name: baseline-llama-throughput
description: Llama-3.1-8B-Instruct tp2 ShareGPT throughput, inductor vs eager
repeats: 3
arms:
  inductor:
    extra_args: []
  eager:
    extra_args: [--enforce-eager]
env: {}
command: >
  vllm bench throughput --model meta-llama/Llama-3.1-8B-Instruct
  --dtype bfloat16 -tp 2 --distributed-executor-backend mp --block-size 128
  --max-num-batched-tokens 2048 --max-num-seqs 256 --trust-remote-code
  --dataset-name sharegpt
  --dataset-path {remote_root}/datasets/ShareGPT_V3_unfiltered_cleaned_split.json
  --num-prompts 200 --backend vllm
  --output-json {metrics_json} {arm_extra_args}
metrics:
  requests_per_s: requests_per_second
  tokens_per_s: tokens_per_second
  elapsed_s: elapsed_time
primary_metric: tokens_per_s
forbidden_env: [VLLM_CPU_CI_ENV]
